apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: default
  labels:
    app: nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      name: nginx
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.14.2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          env:
            - name: ENV
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: env
          volumeMounts:
            - mountPath: /etc/config
              name: credentials
      restartPolicy: Always
      volumes:
        - name: credentials
          configMap:
            name: credentials

      